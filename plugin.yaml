name: hermes-trace
version: 0.1.0
description: Build a trace graph of Hermes agent execution
author: user
provides_hooks:
  - on_session_start
  - on_session_end
  - on_session_finalize
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - api_request_error
  - pre_tool_call
  - post_tool_call
  - subagent_start
  - subagent_stop
  - pre_approval_request
  - post_approval_response
  - on_session_reset
